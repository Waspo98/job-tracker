<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d1117">
    <title>Offline - Job Tracker</title>
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --border: #2a3441;
            --accent: #5a7ee8;
            --text: #e6edf3;
            --text-dim: #8b949e;
        }

        * { box-sizing: border-box; }

        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            padding: 24px;
            background: var(--bg);
            color: var(--text);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        .offline-card {
            width: min(420px, 100%);
            padding: 28px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
        }

        img {
            width: 42px;
            height: 42px;
            border-radius: 9px;
            margin-bottom: 16px;
        }

        h1 {
            margin: 0;
            font-size: 22px;
        }

        p {
            margin: 8px 0 0;
            color: var(--text-dim);
            line-height: 1.5;
        }

        a {
            display: inline-flex;
            margin-top: 20px;
            color: var(--accent);
            text-decoration: none;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <main class="offline-card">
        <img src="/static/logo.png?v=20260501-brand" alt="">
        <h1>You are offline</h1>
        <p>Job Tracker needs a connection to check careers pages and sync your alerts. Reconnect and try again.</p>
        <a href="/">Retry</a>
    </main>
</body>
</html>
